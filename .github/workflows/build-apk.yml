name: Build APK

# Buenas prácticas (estilo Fichero): build en la nube (no en la PC del dev),
# Gradle cache, artifact + Release descargable. El APK es híbrido → la mayoría de
# los cambios son web (Vercel) y aparecen al instante sin rebuild; este CI solo
# corre ante cambios NATIVOS (manifest, plugin, icono, config).

on:
  push:
    branches: [main, master]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Instalar dependencias
        run: npm install

      - name: Capacitor sync
        run: npx cap sync android

      - name: Build APK debug (arm64 + universal)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Subir artifact
        uses: actions/upload-artifact@v4
        with:
          name: monetary-app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Publicar Release "latest" (descarga directa)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Monetary APK (último build)
          files: android/app/build/outputs/apk/debug/app-debug.apk
